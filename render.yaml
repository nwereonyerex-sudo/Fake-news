services:
  - type: web
    name: fake-news-detector-api
    runtime: python
    plan: free
    buildCommand: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements-render.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.6
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
